name: Add Member Request
description: Request to add a new organization member
title: "[Add Member] "
labels: ["issueops:member-add", "status:pending"]
body:
  - type: markdown
    attributes:
      value: |
        ## Add Member Request

        Use this form to request adding a new member.
        Complete all required fields.

        This form accepts one member per request. If you need to add multiple people, follow the instructions in the repository README.md to open a pull request for member additions. Contact an administrator if you need help with that process.

  - type: input
    id: github_username
    attributes:
      label: GitHub Username
      description: Enter the GitHub username for the member you want to add
      placeholder: "e.g. octocat"
    validations:
      required: true
      
  - type: input
    id: email
    attributes:
      label: Email Address
      description: Enter the member's email address for identification
      placeholder: "e.g. user@example.com"
    validations:
      required: true
      
  - type: dropdown
    id: role
    attributes:
      label: Role
      description: Select the role to grant
      options:
        - member
        - admin
      default: 0
    validations:
      required: true
      
  - type: textarea
    id: teams
    attributes:
      label: Teams to Add
      description: Enter one team name per line for any additional teams (optional). Members are added to `ALL_MEMBERS` automatically, so you do not need to list it here.
      placeholder: |
        frontend-team
        backend-team
    validations:
      required: false
      
  - type: textarea
    id: reason
    attributes:
      label: Request Reason
      description: Provide the background or justification for this request (optional)
      placeholder: "e.g. Joining Project XXX"
    validations:
      required: false
